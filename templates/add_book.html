{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="glass-card p-4 mb-5">
            <h2 class="mb-4" style="color: var(--text-color);">Add a New Book</h2>
            
            <div class="row mb-4 pb-4 border-bottom" style="border-color: var(--glass-border) !important;">
                <div class="col-12">
                    <label class="form-label" style="color: var(--accent-primary); font-weight: 600;">
                        <i class="fas fa-magic"></i> Auto-Fill with Open Library
                    </label>
                    <div class="input-group">
                        <input type="text" id="autoFillQuery" class="form-control" placeholder="Enter ISBN, Title, or Author...">
                        <button class="btn btn-outline-primary" type="button" id="autoFillBtn" style="border-top-left-radius: 0; border-bottom-left-radius: 0;">
                            <i class="fas fa-search"></i> Fetch Details
                        </button>
                    </div>
                    <div id="autoFillStatus" class="form-text mt-2" style="color: var(--text-color); opacity: 0.7;">
                        Saves you time by grabbing the cover, author, and page count automatically!
                    </div>
                </div>
            </div>

            <form method="POST" class="needs-validation" novalidate>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Title *</label>
                        <input type="text" class="form-control" name="title" required>
                        <div class="invalid-feedback">Please enter a book title.</div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Author *</label>
                        <input type="text" class="form-control" name="author" required>
                        <div class="invalid-feedback">Please enter the author's name.</div>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-8">
                        <label class="form-label">Series Name (Optional)</label>
                        <input type="text" class="form-control" name="series" placeholder="e.g. Harry Potter">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Volume / Book #</label>
                        <input type="text" class="form-control" name="series_number" placeholder="e.g. 1 or 2.5">
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-5">
                        <label class="form-label">Genre</label>
                        <input type="text" class="form-control" name="genre">
                    </div>
                    <div class="col-md-7">
                        <label class="form-label">Custom Tags</label>
                        <input type="text" class="form-control" name="tags" placeholder="e.g. sci-fi, summer read">
                        <small class="text-muted" style="font-size: 0.75rem;">Separate with commas</small>
                    </div>
                </div>

                <div class="row mb-3 align-items-center">
                    <div class="col-md-4">
                        <label class="form-label">Status</label>
                        <select class="form-select" name="status" id="bookStatus">
                            <option value="Want to Read">Want to Read</option>
                            <option value="Currently Reading">Currently Reading</option>
                            <option value="Completed">Completed</option>
                            <option value="Abandoned">Abandoned</option>
                        </select>
                    </div>
                    
                    <div class="col-md-4 text-center">
                        <label class="form-label d-block mb-1">Rating</label>
                        <div class="star-rating fs-4 text-warning d-flex justify-content-center text-nowrap gap-1" style="cursor: pointer;">
                            <i class="far fa-star rating-star" data-value="1"></i>
                            <i class="far fa-star rating-star" data-value="2"></i>
                            <i class="far fa-star rating-star" data-value="3"></i>
                            <i class="far fa-star rating-star" data-value="4"></i>
                            <i class="far fa-star rating-star" data-value="5"></i>
                        </div>
                        <input type="hidden" name="rating" id="ratingInput" value="0">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Total Pages *</label>
                        <input type="number" class="form-control" name="total_pages" required min="1">
                    </div>
                </div>

                <div class="row mb-4 justify-content-end" id="currentPageDiv" style="display: none;">
                    <div class="col-md-4">
                        <label class="form-label">Pages Read</label>
                        <input type="number" class="form-control" name="current_page" min="0">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Notes/Description</label>
                    <textarea class="form-control" name="notes" rows="4"></textarea>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Cover Image URL (Optional)</label>
                    <input type="url" class="form-control" name="cover_image">
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Save Book</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="glass-card p-5 text-center">
            <i class="fas fa-book-reader fa-3x text-primary mb-3"></i>
            <h2 class="mb-4">Welcome Back</h2>
            <form method="POST">
                <div class="mb-3 text-start">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-4 text-start position-relative">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" name="password" id="pass" class="form-control" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePass('pass')"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3 hover-lift">Log In</button>
            </form>
            <p class="text-muted">Don't have an account? <a href="{{ url_for('register') }}">Sign up here</a></p>
        </div>
    </div>
</div>

<script>
    function togglePass(id) {
        const x = document.getElementById(id);
        const icon = x.nextElementSibling.querySelector('i');
        if (x.type === "password") {
            x.type = "text";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            x.type = "password";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
